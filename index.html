<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAFT CONTROL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@500;600;700&display=swap');
  :root{
    --bg:#0a0e14; --panel:#12181f; --line:#1f2833; --line-2:#2a3542;
    --amber:#ffb703; --cyan:#00d9ff; --red:#ff4d4d; --green:#3ddc84;
    --txt:#e8eef2; --dim:#7d8b99;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono',monospace;
    -webkit-font-smoothing:antialiased;padding-bottom:40px;}
  .wrap{max-width:780px;margin:0 auto;padding:0 14px;}

  /* header */
  header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line);}
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;max-width:780px;margin:0 auto;}
  .logo{font-weight:700;letter-spacing:0.18em;font-size:13px;color:var(--amber);}
  .logo b{color:var(--cyan);}
  .status{font-size:10px;color:var(--dim);letter-spacing:0.1em;}
  .status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);margin-right:5px;animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* league tabs */
  .leagues{display:flex;gap:0;border-bottom:1px solid var(--line);background:var(--bg);}
  .leagues button{flex:1;background:none;border:none;border-bottom:2px solid transparent;
    color:var(--dim);font-family:inherit;font-size:11px;font-weight:600;letter-spacing:0.04em;
    padding:11px 6px;cursor:pointer;}
  .leagues button .plat{display:block;font-size:8.5px;letter-spacing:0.14em;margin-top:3px;opacity:.6;}
  .leagues button.on{color:var(--amber);border-bottom-color:var(--amber);}

  /* clock row */
  .clockrow{display:flex;align-items:center;gap:16px;padding:18px 0 6px;}
  .radar{width:64px;height:64px;border-radius:50%;border:1px solid var(--line);position:relative;flex-shrink:0;
    background:repeating-radial-gradient(circle,transparent 0 11px,var(--line) 11px 12px);}
  .radar .sweep{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg,rgba(255,183,3,.55),transparent 65deg);animation:spin 3s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .clock .big{font-size:26px;font-weight:700;color:var(--amber);line-height:1;}
  .clock .lbl{font-size:10px;color:var(--dim);letter-spacing:0.1em;margin-top:5px;}

  /* section label */
  .seclabel{font-size:10px;letter-spacing:0.16em;color:var(--cyan);margin:22px 0 10px;text-transform:uppercase;}
  .seclabel::before{content:'◈ ';}

  /* recommendation card */
  .card{background:var(--panel);border:1px solid var(--line);position:relative;padding:15px;margin-bottom:11px;}
  .card::before,.card::after{content:'';position:absolute;width:9px;height:9px;border:1px solid var(--amber);}
  .card::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
  .card::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}
  .rec .top{display:flex;justify-content:space-between;align-items:baseline;}
  .rec .name{font-size:18px;font-weight:700;color:var(--amber);}
  .rec .posbadge{font-size:10px;padding:2px 7px;border:1px solid var(--line-2);color:var(--cyan);}
  .rec .meta{font-size:10.5px;color:var(--dim);margin:4px 0 12px;letter-spacing:0.02em;}
  .rec .row{display:flex;justify-content:space-between;font-size:11px;padding:7px 0;border-top:1px solid var(--line);}
  .rec .row .why{color:var(--cyan);text-align:right;max-width:62%;}
  .rec .row .why.warn{color:var(--red);}
  .tierpill{display:inline-block;font-size:9px;padding:2px 6px;border-radius:2px;margin-left:6px;
    background:rgba(0,217,255,.1);color:var(--cyan);vertical-align:middle;}

  /* feed ticker */
  .ticker{background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    overflow:hidden;white-space:nowrap;padding:8px 0;margin:6px 0 0;}
  .ticker .track{display:inline-block;animation:scroll 26s linear infinite;}
  .ticker span{font-size:10.5px;color:var(--dim);padding-right:34px;}
  .ticker span b{color:var(--cyan);}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* roster grid */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
  .slot{background:var(--panel);border:1px solid var(--line);padding:9px 10px;}
  .slot .s-pos{font-size:9px;letter-spacing:0.12em;color:var(--dim);}
  .slot .s-val{font-size:12px;margin-top:3px;}
  .slot.filled .s-val{color:var(--txt);}
  .slot.empty .s-val{color:var(--line-2);}
  .slot.need{border-color:var(--red);}
  .slot.need .s-pos{color:var(--red);}
  .slot.keeper{border-color:var(--amber);}
  .slot.keeper .s-pos{color:var(--amber);}

  /* board table */
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th{text-align:left;font-size:9px;letter-spacing:0.1em;color:var(--dim);text-transform:uppercase;
    padding:6px 6px;border-bottom:1px solid var(--line-2);font-weight:500;}
  td{padding:7px 6px;border-bottom:1px solid var(--line);}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .diff-pos{color:var(--green);} .diff-neg{color:var(--red);}
  tr.gone td{opacity:.32;text-decoration:line-through;}
  .foot{font-size:9.5px;color:var(--dim);margin-top:14px;line-height:1.6;}
  .empty-note{font-size:11px;color:var(--dim);padding:20px;text-align:center;border:1px dashed var(--line-2);}

  /* mode toggle (Draft / History) */
  .modes{display:flex;gap:8px;padding:12px 0 2px;}
  .modes button{background:var(--panel);border:1px solid var(--line);color:var(--dim);
    font-family:inherit;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
    padding:8px 14px;cursor:pointer;}
  .modes button.on{color:var(--bg);background:var(--amber);border-color:var(--amber);}

  /* headline cards */
  .headline{background:var(--panel);border-left:2px solid var(--cyan);padding:10px 12px;margin-bottom:8px;
    font-size:11.5px;line-height:1.5;color:var(--txt);}
  .headline b{color:var(--amber);}

  /* tier spread heatmap-ish table */
  .tiertbl td.bar-cell{padding:4px 6px;min-width:120px;}
  .barwrap{position:relative;height:16px;background:var(--line);border-radius:2px;overflow:hidden;}
  .barfill{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,rgba(0,217,255,.35),rgba(255,183,3,.55));}
  .barlbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;
    padding:0 5px;font-size:9px;color:var(--txt);}
  .pos-head{color:var(--amber);font-weight:700;font-size:11px;padding-top:12px;}

  /* owner cards */
  .ownercard{background:var(--panel);border:1px solid var(--line);padding:12px;margin-bottom:9px;}
  .ownercard .oname{font-size:14px;font-weight:700;color:var(--amber);}
  .ownercard .otag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;margin-left:8px;
    vertical-align:middle;letter-spacing:0.06em;}
  .otag.stars{background:rgba(255,77,77,.15);color:var(--red);}
  .otag.balanced{background:rgba(61,220,132,.15);color:var(--green);}
  .otag.value{background:rgba(0,217,255,.15);color:var(--cyan);}
  .ownercard .ostats{display:flex;flex-wrap:wrap;gap:14px;margin-top:9px;}
  .ostat{font-size:10px;color:var(--dim);}
  .ostat b{display:block;font-size:15px;color:var(--txt);font-weight:700;margin-top:2px;}
  .posspend{margin-top:9px;font-size:10px;color:var(--dim);line-height:1.7;}
  .posspend .pchip{display:inline-block;background:var(--line);border-radius:3px;padding:2px 6px;margin:2px 4px 0 0;color:var(--txt);}
  .stratnote{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:11px;color:var(--txt);line-height:1.55;}
</style>
</head>
<body>

<header>
  <div class="hbar">
    <div class="logo">DRAFT<b>CONTROL</b></div>
    <div class="status"><span class="dot"></span><span id="statustxt">DATA LOADED · MOCK MODE</span></div>
  </div>
  <div class="leagues" id="leagues"></div>
</header>

<div class="wrap">
  <div class="modes" id="modes">
    <button data-mode="draft" class="on">Draft</button>
    <button data-mode="history">History</button>
  </div>

  <!-- DRAFT VIEW -->
  <div id="draftView">
    <div class="clockrow">
      <div class="radar"><div class="sweep"></div></div>
      <div class="clock">
        <div class="big" id="clock">--:--</div>
        <div class="lbl" id="clocklbl">AWAITING DRAFT START</div>
      </div>
    </div>

    <div class="seclabel">Top Recommendation — <span id="myteamlbl"></span></div>
    <div id="recArea"></div>

    <div class="seclabel">Live Feed</div>
    <div class="ticker"><div class="track" id="ticker"></div></div>

    <div class="seclabel">Your Roster</div>
    <div class="roster" id="roster"></div>

    <div class="seclabel">Board — Best Available</div>
    <div id="boardArea"></div>

    <div class="foot" id="foot"></div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="historyView" style="display:none;"></div>
</div>

<script>
let DATA=null, ZHIST=null, activeLeague='kepners', activeMode='draft';

// ---- data load: bigboard.json (+ optional zimmer_analysis.json) alongside this file ----
async function boot(){
  try{
    const r = await fetch('bigboard.json');
    DATA = await r.json();
  }catch(e){
    document.getElementById('statustxt').textContent='bigboard.json NOT FOUND — run converter';
    return;
  }
  // Zimmer analysis is optional — only present after the analysis workflow runs.
  try{
    const r2 = await fetch('zimmer_analysis.json');
    if(r2.ok) ZHIST = await r2.json();
  }catch(e){ /* history view will show an empty state */ }

  renderLeagueTabs();
  wireModes();
  render();
}

function wireModes(){
  document.querySelectorAll('#modes button').forEach(b=>{
    b.onclick=()=>{
      activeMode=b.dataset.mode;
      document.querySelectorAll('#modes button').forEach(x=>x.classList.toggle('on',x===b));
      document.getElementById('draftView').style.display = activeMode==='draft'?'':'none';
      document.getElementById('historyView').style.display = activeMode==='history'?'':'none';
      render();
    };
  });
}

function renderLeagueTabs(){
  const el=document.getElementById('leagues');
  const names={kepners:'KEPNERS KEEPERS',miami:'MIAMI DOMERS',zimmer:'ZIMMER'};
  el.innerHTML=Object.keys(DATA.leagues).map(k=>{
    const lg=DATA.leagues[k];
    return `<button data-k="${k}" class="${k===activeLeague?'on':''}">${names[k]||k}
      <span class="plat">${lg.platform.toUpperCase()} · ${lg.myTeam}</span></button>`;
  }).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    activeLeague=b.dataset.k;
    el.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    render();
  });
}

// ---------- recommendation engine (v1 heuristic) ----------
// Score = your-rank priority + positional need bump + scarcity-before-turn.
// Live draft state (drafted[], myRoster) is empty in mock mode; wire the
// proxy poll here later — everything below already reacts to it.
function computeRecs(lg){
  const drafted=new Set();            // playerIds already gone (from live feed)
  const rosterCounts={};              // your filled counts by position
  const need=neededPositions(lg,rosterCounts);
  const pool=DATA.players
    .filter(p=>p.pos!=='NA' && p.seanPosRank!=null && !drafted.has(p.id))
    .map(p=>{
      let score=1000-(p.avgRank||300);           // consensus baseline
      if(need.has(p.pos)) score+=120;            // fills a need
      if(p.tierGroup==='avoid') score-=400;
      if(p.tierGroup==='handcuff') score-=150;
      if(typeof p.myDiff==='number') score+=p.myDiff*4; // you rate above ADP
      // keeper lock: if a player is kept in THIS league, remove from pool
      if(lg.keepers.some(k=>k.playerId===p.id)) score=-1e9;
      return {...p,_score:score};
    })
    .filter(p=>p._score>-1e8)
    .sort((a,b)=>b._score-a._score);
  return {pool,need};
}

function neededPositions(lg,counts){
  // crude v1: any starter slot type not yet filled is a need
  const starters=lg.rosterSlots.filter(s=>!['BEN','K','DEF'].includes(s));
  const need=new Set();
  starters.forEach(s=>{ const key=s==='FLEX'?'RB':s; if(!(counts[key]>0)) need.add(key); });
  return need;
}

function render(){
  const lg=DATA.leagues[activeLeague];

  // History view is Zimmer-only (auction analysis). For other leagues, force draft mode.
  const historyBtn=document.querySelector('#modes button[data-mode="history"]');
  if(activeLeague!=='zimmer'){
    historyBtn.style.display='none';
    if(activeMode==='history'){ activeMode='draft';
      document.querySelectorAll('#modes button').forEach(x=>x.classList.toggle('on',x.dataset.mode==='draft'));
      document.getElementById('draftView').style.display='';
      document.getElementById('historyView').style.display='none';
    }
  } else {
    historyBtn.style.display='';
  }

  if(activeMode==='history'){ renderHistory(); return; }

  document.getElementById('myteamlbl').textContent=lg.myTeam;

  if(!lg.teams.length){
    document.getElementById('recArea').innerHTML=
      `<div class="empty-note">${activeLeague.toUpperCase()} team sheet not yet in the workbook.<br>
       Recommendations activate once the FY26 Team tab is populated.</div>`;
    document.getElementById('roster').innerHTML='';
    document.getElementById('boardArea').innerHTML='';
    renderTicker(lg); renderFoot(lg); return;
  }

  const {pool,need}=computeRecs(lg);
  renderRec(pool[0],need,lg);
  renderTicker(lg);
  renderRoster(lg);
  renderBoard(pool.slice(0,12));
  renderFoot(lg);
}

function renderRec(p,need,lg){
  if(!p){document.getElementById('recArea').innerHTML='';return;}
  const survives=p.avgRank!=null && p.avgRank<24 ? 'likely gone by your next pick'
                 : 'expected to survive to your next pick';
  const survClass = p.avgRank!=null && p.avgRank<24 ? 'warn':'';
  document.getElementById('recArea').innerHTML=`
    <div class="card rec">
      <div class="top">
        <div class="name">${p.name.toUpperCase()}
          <span class="tierpill">${p.tier||'—'}</span></div>
        <div class="posbadge">${p.pos}</div>
      </div>
      <div class="meta">${p.team||''} · YOUR POS RANK #${p.seanPosRank} · CONSENSUS ADP #${p.avgRank??'—'}${
        typeof p.myDiff==='number'?` · YOUR DIFF ${p.myDiff>0?'+':''}${p.myDiff}`:''}</div>
      <div class="row"><span>Positional need</span>
        <span class="why">${need.has(p.pos)?'fills open '+p.pos+' starter':'depth / BPA'}</span></div>
      <div class="row"><span>Survival to next pick</span>
        <span class="why ${survClass}">${survives}</span></div>
      <div class="row"><span>Keeper impact (this league)</span>
        <span class="why">${lg.keepers.length} players kept league-wide</span></div>
    </div>`;
}

function renderTicker(lg){
  // mock feed from keepers so it looks live; replace with poll results
  const items = lg.keepers.length
    ? lg.keepers.slice(0,8).map(k=>`<span><b>${k.team}</b> keeps ${k.player} (R${k.round})</span>`)
    : [`<span>NO PICKS YET · <b>${lg.myTeam}</b> ON DECK</span>`];
  const track=[...items,...items].join('');
  document.getElementById('ticker').innerHTML=track;
}

function renderRoster(lg){
  const keptForMe=lg.keepers.filter(k=>{
    const me=lg.teams.find(t=>t.isMe); return me && k.team===me.team;
  });
  document.getElementById('roster').innerHTML=lg.rosterSlots.map((slot,i)=>{
    const kept=keptForMe[i];
    const cls = kept?'filled keeper':(['BEN'].includes(slot)?'empty':'empty need');
    return `<div class="slot ${cls}">
      <div class="s-pos">${slot}</div>
      <div class="s-val">${kept?kept.player:'—'}</div></div>`;
  }).join('');
}

function renderBoard(list){
  document.getElementById('boardArea').innerHTML=`
    <table><thead><tr>
      <th>Player</th><th>Pos</th><th class="num">You</th>
      <th class="num">ADP</th><th class="num">Diff</th><th>Tier</th>
    </tr></thead><tbody>${
      list.map(p=>{
        const d=typeof p.myDiff==='number'?p.myDiff:null;
        const dc=d==null?'':(d>0?'diff-pos':'diff-neg');
        return `<tr>
          <td>${p.name}</td><td>${p.pos}</td>
          <td class="num">${p.seanPosRank}</td>
          <td class="num">${p.avgRank??'—'}</td>
          <td class="num ${dc}">${d==null?'—':(d>0?'+':'')+d}</td>
          <td style="color:var(--dim)">${(p.tier||'').split(' - ')[0]||'—'}</td>
        </tr>`;
      }).join('')
    }</tbody></table>`;
}

function renderFoot(lg){
  document.getElementById('foot').innerHTML=
    `SOURCE · ${DATA.players.length} players from FY${DATA.meta.season} Big Board · `+
    `${lg.teams.length} teams · ${lg.keepers.length} keepers · platform ${lg.platform.toUpperCase()}.<br>`+
    `MOCK MODE — live draft feed & roster fill activate when the ${lg.platform.toUpperCase()} poll is wired in.`;
}

// ---------- Zimmer History view ----------
function tagClass(tag){
  if(tag==='Stars & Scrubs') return 'stars';
  if(tag==='Value Hunter') return 'value';
  if(tag==='Balanced') return 'balanced';
  if(tag==='Market Driver') return 'stars';
  if(tag==='Quiet Accumulator') return 'value';
  if(tag.startsWith('Punts')) return 'value';
  return 'balanced'; // e.g. "RB-Priority"
}

function renderHistory(){
  const el=document.getElementById('historyView');
  if(!ZHIST){
    el.innerHTML=`<div class="seclabel">Zimmer Auction History</div>
      <div class="empty-note">zimmer_analysis.json not found.<br>
      Run the "Update Zimmer Draft History" workflow, then the analysis step, to populate this view.</div>`;
    return;
  }

  // headlines
  const headlinesHtml = (ZHIST.headlines||[]).map(h=>{
    // bold any $-amounts and position-tier tokens for scannability
    const withBold=h.replace(/(\$\d+)/g,'<b>$1</b>');
    return `<div class="headline">${withBold}</div>`;
  }).join('');

  // tier spread table, grouped by position with an inline range bar
  const tiers=ZHIST.tier_spreads||[];
  const globalMax=Math.max(1,...tiers.map(t=>t.high));
  let tierRows=''; let curPos=null;
  tiers.forEach(t=>{
    if(t.position!==curPos){
      curPos=t.position;
      tierRows+=`<tr><td colspan="5" class="pos-head">${curPos}</td></tr>`;
    }
    const leftPct=100*t.low/globalMax;
    const widthPct=Math.max(2,100*(t.high-t.low)/globalMax);
    tierRows+=`<tr>
      <td>${t.tier}</td>
      <td class="bar-cell">
        <div class="barwrap">
          <div class="barfill" style="left:${leftPct}%;width:${widthPct}%;"></div>
          <div class="barlbl"><span>$${t.low}</span><span>$${t.high}</span></div>
        </div>
      </td>
      <td class="num">$${t.avg}</td>
      <td class="num">$${t.spread}</td>
      <td class="num">${t.n}</td>
    </tr>`;
  });

  // owner cards
  const owners=ZHIST.owners||[];
  const ownerCards=owners.map(o=>{
    const tagsHtml=(o.tags||[]).map(t=>`<span class="otag ${tagClass(t)}">${t.toUpperCase()}</span>`).join('');
    const posChips=Object.entries(o.pos_avg_spend||{})
      .sort((a,b)=>b[1]-a[1])
      .map(([pos,avg])=>`<span class="pchip">${pos} avg $${avg}</span>`).join('');
    return `<div class="ownercard">
      <div class="oname">${o.owner}${tagsHtml}</div>
      <div class="ostats">
        <div class="ostat">TOP-3 SPEND<b>${o.top3_spend_share_pct}%</b></div>
        <div class="ostat">STUDS / DRAFT<b>${o.avg_studs_per_draft}</b></div>
        <div class="ostat">BARGAINS / DRAFT<b>${o.avg_bargains_per_draft}</b></div>
        <div class="ostat">MAX BID EVER<b>$${o.max_bid_ever}</b></div>
        <div class="ostat">SEASONS<b>${o.seasons}</b></div>
      </div>
      <div class="posspend">Avg spend by position: ${posChips||'—'}</div>
      <div class="stratnote">${o.strategy_note||''}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="seclabel">Zimmer Auction — Key Trends</div>
    ${headlinesHtml}

    <div class="seclabel">Winning-Bid Spread by Position Tier</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:8px;line-height:1.5;">
      Tiers derived per season by ranking each position's players on price paid
      (WR1 = the priciest WRs that year). Pooled across ${ (ZHIST.seasons_analyzed||[]).length } drafts:
      ${(ZHIST.seasons_analyzed||[]).join(', ')}.
    </div>
    <table class="tiertbl"><thead><tr>
      <th>Tier</th><th>Low → High Range</th><th class="num">Avg</th>
      <th class="num">Spread</th><th class="num">N</th>
    </tr></thead><tbody>${tierRows}</tbody></table>

    <div class="seclabel">Per-Owner Auction Tendencies</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:8px;line-height:1.5;">
      Aggregated by owner (team names change year to year; name variants merged, one-season
      members excluded). Three signals combine into each owner's tags: spend concentration
      (stars-and-scrubs vs. balanced vs. value), positional lean vs. league average, and
      nomination behavior (do their nominations tend to sell high or cheap). Strategy note
      below each card is the tactical takeaway for a head-to-head bid.
    </div>
    ${ownerCards}

    <div class="foot">
      SOURCE · zimmer_analysis.json · ${owners.length} owners across
      ${(ZHIST.seasons_analyzed||[]).length} auction seasons.
    </div>`;
}

boot();
</script>
</body>
</html>
