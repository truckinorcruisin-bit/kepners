<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAFT CONTROL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@500;600;700&display=swap');
  :root{
    --bg:#0a0e14; --panel:#12181f; --line:#1f2833; --line-2:#2a3542;
    --amber:#ffb703; --cyan:#00d9ff; --red:#ff4d4d; --green:#3ddc84;
    --txt:#e8eef2; --dim:#7d8b99;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Mono',monospace;
    -webkit-font-smoothing:antialiased;padding-bottom:40px;}
  .wrap{max-width:780px;margin:0 auto;padding:0 14px;}

  /* header */
  header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--line);}
  .hbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;max-width:780px;margin:0 auto;}
  .logo{font-weight:700;letter-spacing:0.18em;font-size:13px;color:var(--amber);}
  .logo b{color:var(--cyan);}
  .status{font-size:10px;color:var(--dim);letter-spacing:0.1em;}
  .status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green);margin-right:5px;animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* league tabs */
  .leagues{display:flex;gap:0;border-bottom:1px solid var(--line);background:var(--bg);}
  .leagues button{flex:1;background:none;border:none;border-bottom:2px solid transparent;
    color:var(--dim);font-family:inherit;font-size:11px;font-weight:600;letter-spacing:0.04em;
    padding:11px 6px;cursor:pointer;}
  .leagues button .plat{display:block;font-size:8.5px;letter-spacing:0.14em;margin-top:3px;opacity:.6;}
  .leagues button.on{color:var(--amber);border-bottom-color:var(--amber);}

  /* clock row */
  .clockrow{display:flex;align-items:center;gap:16px;padding:18px 0 6px;}
  .radar{width:64px;height:64px;border-radius:50%;border:1px solid var(--line);position:relative;flex-shrink:0;
    background:repeating-radial-gradient(circle,transparent 0 11px,var(--line) 11px 12px);}
  .radar .sweep{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(from 0deg,rgba(255,183,3,.55),transparent 65deg);animation:spin 3s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .clock .big{font-size:26px;font-weight:700;color:var(--amber);line-height:1;}
  .clock .lbl{font-size:10px;color:var(--dim);letter-spacing:0.1em;margin-top:5px;}

  /* section label */
  .seclabel{font-size:10px;letter-spacing:0.16em;color:var(--cyan);margin:22px 0 10px;text-transform:uppercase;}
  .seclabel::before{content:'◈ ';}

  /* recommendation card */
  .card{background:var(--panel);border:1px solid var(--line);position:relative;padding:15px;margin-bottom:11px;}
  .card::before,.card::after{content:'';position:absolute;width:9px;height:9px;border:1px solid var(--amber);}
  .card::before{top:-1px;left:-1px;border-right:none;border-bottom:none;}
  .card::after{bottom:-1px;right:-1px;border-left:none;border-top:none;}
  .rec .top{display:flex;justify-content:space-between;align-items:baseline;}
  .rec .name{font-size:18px;font-weight:700;color:var(--amber);}
  .rec .posbadge{font-size:10px;padding:2px 7px;border:1px solid var(--line-2);color:var(--cyan);}
  .rec .meta{font-size:10.5px;color:var(--dim);margin:4px 0 12px;letter-spacing:0.02em;}
  .rec .row{display:flex;justify-content:space-between;font-size:11px;padding:7px 0;border-top:1px solid var(--line);}
  .rec .row .why{color:var(--cyan);text-align:right;max-width:62%;}
  .rec .row .why.warn{color:var(--red);}
  .tierpill{display:inline-block;font-size:9px;padding:2px 6px;border-radius:2px;margin-left:6px;
    background:rgba(0,217,255,.1);color:var(--cyan);vertical-align:middle;}

  /* feed ticker */
  .ticker{background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    overflow:hidden;white-space:nowrap;padding:8px 0;margin:6px 0 0;}
  .ticker .track{display:inline-block;animation:scroll 26s linear infinite;}
  .ticker span{font-size:10.5px;color:var(--dim);padding-right:34px;}
  .ticker span b{color:var(--cyan);}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* roster grid */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
  .slot{background:var(--panel);border:1px solid var(--line);padding:9px 10px;}
  .slot .s-pos{font-size:9px;letter-spacing:0.12em;color:var(--dim);}
  .slot .s-val{font-size:12px;margin-top:3px;}
  .slot.filled .s-val{color:var(--txt);}
  .slot.empty .s-val{color:var(--line-2);}
  .slot.need{border-color:var(--red);}
  .slot.need .s-pos{color:var(--red);}
  .slot.keeper{border-color:var(--amber);}
  .slot.keeper .s-pos{color:var(--amber);}

  /* board table */
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th{text-align:left;font-size:9px;letter-spacing:0.1em;color:var(--dim);text-transform:uppercase;
    padding:6px 6px;border-bottom:1px solid var(--line-2);font-weight:500;}
  td{padding:7px 6px;border-bottom:1px solid var(--line);}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .diff-pos{color:var(--green);} .diff-neg{color:var(--red);}
  tr.gone td{opacity:.32;text-decoration:line-through;}
  .foot{font-size:9.5px;color:var(--dim);margin-top:14px;line-height:1.6;}
  .empty-note{font-size:11px;color:var(--dim);padding:20px;text-align:center;border:1px dashed var(--line-2);}

  /* mode toggle (Draft / History) */
  .modes{display:flex;gap:8px;padding:12px 0 2px;}
  .modes button{background:var(--panel);border:1px solid var(--line);color:var(--dim);
    font-family:inherit;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
    padding:8px 14px;cursor:pointer;}
  .modes button.on{color:var(--bg);background:var(--amber);border-color:var(--amber);}

  /* headline cards */
  .headline{background:var(--panel);border-left:2px solid var(--cyan);padding:10px 12px;margin-bottom:8px;
    font-size:11.5px;line-height:1.5;color:var(--txt);}
  .headline b{color:var(--amber);}

  /* tier spread heatmap-ish table */
  .tiertbl td.bar-cell{padding:4px 6px;min-width:120px;}
  .barwrap{position:relative;height:16px;background:var(--line);border-radius:2px;overflow:hidden;}
  .barfill{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,rgba(0,217,255,.35),rgba(255,183,3,.55));}
  .barlbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;
    padding:0 5px;font-size:9px;color:var(--txt);}
  .pos-head{color:var(--amber);font-weight:700;font-size:11px;padding-top:12px;}

  /* owner cards */
  .ownercard{background:var(--panel);border:1px solid var(--line);padding:12px;margin-bottom:9px;}
  .ownercard .oname{font-size:14px;font-weight:700;color:var(--amber);}
  .ownercard .otag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;margin-left:8px;
    vertical-align:middle;letter-spacing:0.06em;}
  .otag.stars{background:rgba(255,77,77,.15);color:var(--red);}
  .otag.balanced{background:rgba(61,220,132,.15);color:var(--green);}
  .otag.value{background:rgba(0,217,255,.15);color:var(--cyan);}
  .ownercard .ostats{display:flex;flex-wrap:wrap;gap:14px;margin-top:9px;}
  .ostat{font-size:10px;color:var(--dim);}
  .ostat b{display:block;font-size:15px;color:var(--txt);font-weight:700;margin-top:2px;}
  .posspend{margin-top:9px;font-size:10px;color:var(--dim);line-height:1.7;}
  .posspend .pchip{display:inline-block;background:var(--line);border-radius:3px;padding:2px 6px;margin:2px 4px 0 0;color:var(--txt);}
  .stratnote{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:11px;color:var(--txt);line-height:1.55;}

  /* replay mode: setup screen */
  .replay-setup{background:var(--panel);border:1px solid var(--line);padding:16px;margin-top:8px;}
  .replay-setup label{display:block;font-size:10px;letter-spacing:0.1em;color:var(--dim);
    text-transform:uppercase;margin-bottom:6px;margin-top:14px;}
  .replay-setup label:first-child{margin-top:0;}
  .replay-setup select{width:100%;background:var(--bg);border:1px solid var(--line-2);color:var(--txt);
    font-family:inherit;font-size:13px;padding:9px 10px;}
  .replay-start-btn{width:100%;margin-top:18px;padding:12px;background:var(--amber);color:var(--bg);
    border:none;font-family:inherit;font-weight:700;font-size:12px;letter-spacing:0.08em;
    text-transform:uppercase;cursor:pointer;}
  .replay-disclaimer{font-size:10px;color:var(--dim);line-height:1.6;margin-top:10px;
    border-left:2px solid var(--line-2);padding-left:10px;}

  /* replay mode: playback controls */
  .replay-controls{display:flex;align-items:center;gap:8px;padding:10px 0;}
  .replay-controls button{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    font-family:inherit;font-size:14px;padding:9px 13px;cursor:pointer;}
  .replay-controls button.play-btn{flex:1;background:var(--amber);color:var(--bg);border-color:var(--amber);
    font-weight:700;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;}
  .replay-controls select{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    font-family:inherit;font-size:10px;padding:9px 6px;}
  .replay-progress{font-size:10px;color:var(--dim);letter-spacing:0.06em;padding:0 0 8px;}
  .replay-progress b{color:var(--amber);}
  .retro-tag{display:inline-block;font-size:8.5px;letter-spacing:0.08em;color:var(--bg);
    background:var(--cyan);padding:2px 6px;margin-left:6px;vertical-align:middle;text-transform:uppercase;}

  /* auction draft mode: player search + card */
  .search-wrap{position:relative;margin-bottom:10px;}
  .search-wrap input{width:100%;background:var(--panel);border:1px solid var(--line-2);color:var(--txt);
    font-family:inherit;font-size:14px;padding:11px 12px;}
  .search-results{position:absolute;top:100%;left:0;right:0;background:var(--panel);
    border:1px solid var(--line-2);border-top:none;max-height:260px;overflow-y:auto;z-index:20;}
  .search-results .sr-item{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--line);cursor:pointer;
    display:flex;justify-content:space-between;}
  .search-results .sr-item:hover{background:var(--line);}
  .search-results .sr-item .sr-pos{color:var(--cyan);font-size:10px;}

  .budget-bar{display:flex;gap:10px;margin-bottom:14px;}
  .budget-chip{flex:1;background:var(--panel);border:1px solid var(--line);padding:9px 10px;text-align:center;}
  .budget-chip .bc-val{font-size:17px;font-weight:700;color:var(--amber);}
  .budget-chip .bc-lbl{font-size:8.5px;color:var(--dim);letter-spacing:0.08em;margin-top:2px;}

  .pcard-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
  .pcard-stat{background:var(--panel);border:1px solid var(--line);padding:10px 11px;}
  .pcard-stat .ps-lbl{font-size:8.5px;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase;}
  .pcard-stat .ps-val{font-size:18px;font-weight:700;color:var(--amber);margin-top:3px;}
  .pcard-stat .ps-sub{font-size:9.5px;color:var(--dim);margin-top:2px;}
  .pcard-stat.dim .ps-val{color:var(--dim);font-size:14px;}
  .fit-note{background:var(--panel);border-left:2px solid var(--green);padding:10px 12px;font-size:11.5px;
    line-height:1.55;margin-top:4px;}
  .logged-pick-row{display:flex;justify-content:space-between;align-items:center;background:var(--panel);
    border:1px solid var(--line);padding:7px 10px;margin-bottom:6px;font-size:11px;}
  .logged-pick-row button{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:0 4px;}
  .log-form{display:flex;gap:6px;margin-top:10px;}
  .log-form input{flex:1;background:var(--bg);border:1px solid var(--line-2);color:var(--txt);
    font-family:inherit;font-size:12px;padding:8px;}
  .log-form input.cost-input{flex:0 0 60px;}
  .log-form button{background:var(--amber);color:var(--bg);border:none;font-weight:700;padding:0 14px;cursor:pointer;}

  /* position board */
  .tier-group{margin-bottom:14px;}
  .tier-group-head{display:flex;justify-content:space-between;align-items:baseline;
    padding:8px 10px;background:var(--panel);border:1px solid var(--line);border-bottom:none;}
  .tier-group-head .tg-name{font-size:12px;font-weight:700;color:var(--amber);}
  .tier-group-head .tg-hist{font-size:9.5px;color:var(--dim);}
  .tier-group-head .tg-hist b{color:var(--cyan);}
  .trend-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0.03em;}
  .trend-badge.up{background:rgba(255,77,77,.15);color:var(--red);}
  .trend-badge.down{background:rgba(61,220,132,.15);color:var(--green);}
  .trend-badge.flat{background:rgba(125,139,153,.15);color:var(--dim);}
  .pbr{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;
    border:1px solid var(--line);border-top:none;font-size:11.5px;}
  .pbr:last-child{border-bottom:1px solid var(--line);}
  .pbr.selected{background:rgba(255,183,3,.1);border-left:2px solid var(--amber);}
  .pbr.drafted{opacity:0.5;}
  .pbr.drafted .pbr-name{text-decoration:line-through;}
  .pbr .pbr-rank{color:var(--dim);font-size:9.5px;margin-right:6px;}
  .pbr .pbr-status{font-size:10.5px;}
  .pbr .pbr-status.available{color:var(--green);}
  .pbr .pbr-status.mine{color:var(--amber);font-weight:700;}

  /* ===== auction desktop cockpit ===== */
  .cockpit-banner{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .cockpit-banner .budget-chip{flex:1;min-width:90px;}
  .budget-chip.kpi{border-color:var(--cyan);}
  .budget-chip.kpi .bc-val{color:var(--cyan);}
  .roster-strip{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
  .roster-cell{background:var(--panel);border:1px solid var(--line);padding:5px 9px;font-size:10px;}
  .roster-cell .rc-pos{color:var(--dim);letter-spacing:0.06em;}
  .roster-cell .rc-fill{color:var(--txt);font-weight:600;margin-left:5px;}
  .roster-cell.full{border-color:var(--green);}
  .roster-cell.full .rc-pos{color:var(--green);}

  .cockpit-cols{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:900px){
    .cockpit-cols{grid-template-columns:1fr 1fr 1fr;}
    .wrap{max-width:1200px;}
  }
  .cockpit-col{min-width:0;}
  .cockpit-col .seclabel:first-child{margin-top:0;}

  /* column 2 richer player rows */
  .pbr .pbr-meta{font-size:9px;color:var(--dim);margin-top:2px;}
  .pbr .pbr-metric{font-size:9.5px;text-align:right;white-space:nowrap;}
  .pbr .pbr-metric .m-espn{color:var(--cyan);}
  .pbr .pbr-metric .m-war{color:var(--amber);}
  .pbr-col-main{display:flex;flex-direction:column;min-width:0;flex:1;}

  /* column 3 opponent panels */
  .opp-card{background:var(--panel);border:1px solid var(--line);padding:10px 11px;margin-bottom:8px;}
  .opp-card.hot{border-color:var(--red);box-shadow:0 0 0 1px rgba(255,77,77,0.3);}
  .opp-card.cold{opacity:0.6;}
  .opp-head{display:flex;justify-content:space-between;align-items:baseline;}
  .opp-name{font-size:12px;font-weight:700;color:var(--txt);}
  .opp-budget{font-size:11px;color:var(--amber);font-weight:700;}
  .opp-tags{margin-top:5px;}
  .opp-tags .otag{font-size:8px;padding:1px 6px;}
  .opp-aggr{font-size:9.5px;margin-top:6px;padding-top:6px;border-top:1px solid var(--line);line-height:1.5;}
  .opp-aggr.hot{color:var(--red);}
  .opp-aggr.cold{color:var(--dim);}
  .opp-aggr.neutral{color:var(--cyan);}
  .aggr-legend{font-size:9px;color:var(--dim);margin-bottom:8px;line-height:1.5;}

  /* ===== searchable player table ===== */
  .pt-controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center;}
  .pt-controls input[type=text]{flex:1;min-width:160px;background:var(--panel);border:1px solid var(--line-2);
    color:var(--txt);font-family:inherit;font-size:13px;padding:9px 11px;}
  .pt-controls select{background:var(--panel);border:1px solid var(--line);color:var(--txt);
    font-family:inherit;font-size:11px;padding:9px 8px;}
  .pt-controls label{font-size:9px;color:var(--dim);letter-spacing:0.06em;display:flex;align-items:center;gap:4px;}
  .pt-controls button.clear{background:var(--panel);border:1px solid var(--line-2);color:var(--dim);
    font-family:inherit;font-size:10px;padding:8px 12px;cursor:pointer;letter-spacing:0.06em;}
  .pt-count{font-size:10px;color:var(--dim);margin-bottom:8px;}
  .ptable-wrap{overflow-x:auto;}
  table.ptable{width:100%;border-collapse:collapse;font-size:11px;}
  table.ptable th{position:sticky;top:0;background:var(--bg);text-align:left;font-size:9px;
    letter-spacing:0.06em;text-transform:uppercase;color:var(--dim);padding:7px 8px;
    border-bottom:1px solid var(--line-2);font-weight:500;cursor:pointer;white-space:nowrap;user-select:none;}
  table.ptable th:hover{color:var(--txt);}
  table.ptable th .arrow{color:var(--amber);}
  table.ptable td{padding:7px 8px;border-bottom:1px solid var(--line);white-space:nowrap;}
  table.ptable tr.drafted td{opacity:0.4;}
  table.ptable tr.drafted .pt-name{text-decoration:line-through;}
  table.ptable tr.mine{background:rgba(255,183,3,0.08);}
  .pt-avail{color:var(--green);font-size:10px;}
  .pt-taken{color:var(--dim);font-size:10px;}
  .pt-num{text-align:right;font-variant-numeric:tabular-nums;}
  .pt-war-pos{color:var(--green);} .pt-war-neg{color:var(--red);}
  .pt-toggle{display:flex;gap:6px;margin-bottom:12px;}
  .pt-toggle button{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--dim);
    font-family:inherit;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
    padding:8px;cursor:pointer;}
  .pt-toggle button.on{background:var(--amber);color:var(--bg);border-color:var(--amber);}

  /* opponent cards flow into multiple columns when there's width to spare,
     so at wide screens you can see everyone without scrolling. */
  .opp-grid{display:grid;grid-template-columns:1fr;gap:8px;}

  /* progressively wider screens unlock more room for the cockpit and let the
     opponent panel spread horizontally instead of forcing a long scroll. */
  @media(min-width:1500px){
    .wrap{max-width:1600px;}
  }
  @media(min-width:1900px){
    .wrap{max-width:1850px;}
    /* give column 3 more relative width so its cards can go 2-up */
    .cockpit-cols{grid-template-columns:1fr 1fr 1.6fr;}
    .opp-grid{grid-template-columns:1fr 1fr;}
  }
  @media(min-width:2400px){
    .cockpit-cols{grid-template-columns:1fr 1fr 2fr;}
    .opp-grid{grid-template-columns:1fr 1fr 1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="hbar">
    <div class="logo">DRAFT<b>CONTROL</b></div>
    <div class="status"><span class="dot"></span><span id="statustxt">DATA LOADED · MOCK MODE</span></div>
  </div>
  <div class="leagues" id="leagues"></div>
</header>

<div class="wrap">
  <div class="modes" id="modes">
    <button data-mode="draft" class="on">Draft</button>
    <button data-mode="players">Players</button>
    <button data-mode="history">History</button>
    <button data-mode="replay">Replay</button>
  </div>

  <!-- DRAFT VIEW -->
  <div id="draftView">
    <div id="snakeDraftUI">
      <div class="clockrow">
        <div class="radar"><div class="sweep"></div></div>
        <div class="clock">
          <div class="big" id="clock">--:--</div>
          <div class="lbl" id="clocklbl">AWAITING DRAFT START</div>
        </div>
      </div>

      <div class="seclabel">Top Recommendation — <span id="myteamlbl"></span></div>
      <div id="recArea"></div>

      <div class="seclabel">Live Feed</div>
      <div class="ticker"><div class="track" id="ticker"></div></div>

      <div class="seclabel">Your Roster</div>
      <div class="roster" id="roster"></div>

      <div class="seclabel">Board — Best Available</div>
      <div id="boardArea"></div>

      <div class="foot" id="foot"></div>
    </div>

    <div id="auctionDraftUI" style="display:none;"></div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="historyView" style="display:none;"></div>

  <!-- REPLAY VIEW -->
  <div id="replayView" style="display:none;"></div>

  <!-- PLAYERS VIEW (standalone) -->
  <div id="playersView" style="display:none;"></div>
</div>

<script>
let DATA=null, ZHIST=null, ZDRAFTS=null, ZGRADES=null, BIDCAL=null, activeLeague='kepners', activeMode='draft';

// Shared player-table state -- used by BOTH the standalone Players tab and the
// in-cockpit table toggle, so filters/sort persist as you move between them.
// Session-only (plain object, resets on full page reload) per design choice.
let playerTable = {
  query: '', posFilter: 'ALL', availFilter: 'ALL',
  sortKey: 'projectedWar', sortDir: 'desc',
};
// In the Zimmer cockpit, whether the middle column shows the position board
// ('board') or the full searchable table ('table').
let cockpitCol2Mode = 'board';

// Replay mode state
let replay = {
  season: null, myOwner: null, timeline: [], teams: {}, idx: 0,
  playing: false, timer: null, speedMs: 1500, started: false,
};

// Auction draft mode state (Zimmer). In-memory only -- resets on page reload.
// This is the manual-tracking fallback described to the user: log your own
// picks as you win them, since live ESPN draft polling isn't wired in yet.
// ASSUMED_BUDGET and ASSUMED_ROSTER are placeholders -- Zimmer has no Team
// sheet in the workbook (unlike Kepners/Miami) so we don't have its real
// roster construction on file. Correct these if they don't match reality.
const ASSUMED_BUDGET = 200;
const ASSUMED_ROSTER = ['QB','RB','RB','WR','WR','WR','TE','FLEX','DEF','K','BEN','BEN','BEN','BEN','BEN','BEN'];

let zimmerDraft = {
  picks: [],          // {name, position, cost, isMine, owner} -- ALL draft picks
  searchQuery: '',
  selectedPlayerId: null,
};

// Opponent roster/budget assumptions. Zimmer has no Team sheet in the workbook,
// so these mirror ASSUMED_BUDGET/ASSUMED_ROSTER. Owner list is pulled live from
// zimmer_analysis.json (the real owners we have tendency data for) at render time.
function getOpponentOwners(){
  if(!ZHIST || !ZHIST.owners) return [];
  // Exclude "me" -- we track our own budget separately in the banner.
  return ZHIST.owners.map(o=>o.owner);
}

// Best-effort match of a free-text logged name to a Big Board player, so the
// position board can mark them drafted. Same lightweight normalization idea
// as convert_bigboard.py's name matching (lowercase, trim) -- good enough for
// live-draft speed-typing; unmatched names just won't highlight on the board.
function findBigBoardPlayer(name){
  const norm = s => (s||'').toLowerCase().replace(/[.''\-]/g,'').trim();
  const target = norm(name);
  return DATA.players.find(p=>norm(p.name)===target);
}

// Mirrors zimmer_analysis.py's TIER_SIZES / tier_label EXACTLY -- if you tune
// one, tune the other, or Expected Bid Range lookups will silently mismatch.
const TIER_SIZES = {
  QB: [4,4,4], RB: [12,12,12,12], WR: [12,12,12,12], TE: [4,4,4], K: [12], DEF: [12],
};
function tierLabelForRank(position, rankWithinPos){ // rankWithinPos is 0-indexed
  const sizes = TIER_SIZES[position] || [12,12,12,12,12];
  let start = 1;
  for(let i=0;i<sizes.length;i++){
    const size = sizes[i];
    const end = start + size - 1;
    if(rankWithinPos <= end - 1){
      return size < 12 ? `${position}${start}-${end}` : `${position}${i+1}`;
    }
    start = end + 1;
  }
  return `${position}${start}+`;
}

// ---- data load: bigboard.json (+ optional zimmer_analysis.json / zimmer_draft_history.json) ----
async function boot(){
  try{
    const r = await fetch('bigboard.json');
    DATA = await r.json();
  }catch(e){
    document.getElementById('statustxt').textContent='bigboard.json NOT FOUND — run converter';
    return;
  }
  // Zimmer analysis is optional — only present after the analysis workflow runs.
  try{
    const r2 = await fetch('zimmer_analysis.json');
    if(r2.ok) ZHIST = await r2.json();
  }catch(e){ /* history view will show an empty state */ }
  // Zimmer raw draft history — powers Replay mode.
  try{
    const r3 = await fetch('zimmer_draft_history.json');
    if(r3.ok) ZDRAFTS = await r3.json();
  }catch(e){ /* replay view will show an empty state */ }
  // Zimmer draft effectiveness grades — powers the History view's grading section.
  try{
    const r4 = await fetch('zimmer_draft_grades.json');
    if(r4.ok) ZGRADES = await r4.json();
  }catch(e){ /* grading section will show an empty state */ }
  // Static WAR->$ bid calibration — powers the Mission Control Target Bid.
  try{
    const r5 = await fetch('bid_calibration.json');
    if(r5.ok) BIDCAL = await r5.json();
  }catch(e){ /* target bid will show as unavailable */ }

  renderLeagueTabs();
  wireModes();
  render();
}

function wireModes(){
  document.querySelectorAll('#modes button').forEach(b=>{
    b.onclick=()=>{
      activeMode=b.dataset.mode;
      document.querySelectorAll('#modes button').forEach(x=>x.classList.toggle('on',x===b));
      document.getElementById('draftView').style.display = activeMode==='draft'?'':'none';
      document.getElementById('historyView').style.display = activeMode==='history'?'':'none';
      document.getElementById('replayView').style.display = activeMode==='replay'?'':'none';
      document.getElementById('playersView').style.display = activeMode==='players'?'':'none';
      if(activeMode!=='replay'){ stopReplayTimer(); restoreLivePicks(); }
      render();
    };
  });
}

function renderLeagueTabs(){
  const el=document.getElementById('leagues');
  const names={kepners:'KEPNERS KEEPERS',miami:'MIAMI DOMERS',zimmer:'ZIMMER'};
  el.innerHTML=Object.keys(DATA.leagues).map(k=>{
    const lg=DATA.leagues[k];
    return `<button data-k="${k}" class="${k===activeLeague?'on':''}">${names[k]||k}
      <span class="plat">${lg.platform.toUpperCase()} · ${lg.myTeam}</span></button>`;
  }).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    activeLeague=b.dataset.k;
    el.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    render();
  });
}

// ---------- recommendation engine (v1 heuristic) ----------
// Score = your-rank priority + positional need bump + scarcity-before-turn.
// Live draft state (drafted[], myRoster) is empty in mock mode; wire the
// proxy poll here later — everything below already reacts to it.
function computeRecs(lg){
  const drafted=new Set();            // playerIds already gone (from live feed)
  const rosterCounts={};              // your filled counts by position
  const need=neededPositions(lg,rosterCounts);
  const pool=DATA.players
    .filter(p=>p.pos!=='NA' && p.seanPosRank!=null && !drafted.has(p.id))
    .map(p=>{
      let score=1000-(p.avgRank||300);           // consensus baseline
      if(need.has(p.pos)) score+=120;            // fills a need
      if(p.tierGroup==='avoid') score-=400;
      if(p.tierGroup==='handcuff') score-=150;
      if(typeof p.myDiff==='number') score+=p.myDiff*4; // you rate above ADP
      // keeper lock: if a player is kept in THIS league, remove from pool
      if(lg.keepers.some(k=>k.playerId===p.id)) score=-1e9;
      return {...p,_score:score};
    })
    .filter(p=>p._score>-1e8)
    .sort((a,b)=>b._score-a._score);
  return {pool,need};
}

function neededPositions(lg,counts){
  // crude v1: any starter slot type not yet filled is a need
  const starters=lg.rosterSlots.filter(s=>!['BEN','K','DEF'].includes(s));
  const need=new Set();
  starters.forEach(s=>{ const key=s==='FLEX'?'RB':s; if(!(counts[key]>0)) need.add(key); });
  return need;
}

function render(){
  const lg=DATA.leagues[activeLeague];

  // History and Replay views are Zimmer-only (auction analysis / auction history).
  // For other leagues, force draft mode.
  const historyBtn=document.querySelector('#modes button[data-mode="history"]');
  const replayBtn=document.querySelector('#modes button[data-mode="replay"]');
  if(activeLeague!=='zimmer'){
    historyBtn.style.display='none';
    replayBtn.style.display='none';
    if(activeMode==='history' || activeMode==='replay'){
      activeMode='draft'; stopReplayTimer(); restoreLivePicks();
      document.querySelectorAll('#modes button').forEach(x=>x.classList.toggle('on',x.dataset.mode==='draft'));
    }
  } else {
    historyBtn.style.display='';
    replayBtn.style.display='';
  }

  // Keep view containers in sync with the active mode (covers league-tab switches,
  // which call render() directly rather than going through wireModes()).
  document.getElementById('draftView').style.display = activeMode==='draft'?'':'none';
  document.getElementById('historyView').style.display = activeMode==='history'?'':'none';
  document.getElementById('replayView').style.display = activeMode==='replay'?'':'none';
  document.getElementById('playersView').style.display = activeMode==='players'?'':'none';

  if(activeMode==='history'){ renderHistory(); return; }
  if(activeMode==='replay'){ renderReplay(); return; }
  if(activeMode==='players'){ renderPlayersTab(); return; }

  // Draft mode itself branches by format: auction (Zimmer) needs a fundamentally
  // different UI (evaluate a nominated player) than snake (Kepners/Miami, "who's
  // recommended next"). Both live under the same Draft tab.
  const snakeUI = document.getElementById('snakeDraftUI');
  const auctionUI = document.getElementById('auctionDraftUI');
  if(activeLeague==='zimmer'){
    snakeUI.style.display='none';
    auctionUI.style.display='';
    renderAuctionDraft();
    return;
  } else {
    snakeUI.style.display='';
    auctionUI.style.display='none';
  }

  document.getElementById('myteamlbl').textContent=lg.myTeam;

  if(!lg.teams.length){
    document.getElementById('recArea').innerHTML=
      `<div class="empty-note">${activeLeague.toUpperCase()} team sheet not yet in the workbook.<br>
       Recommendations activate once the FY26 Team tab is populated.</div>`;
    document.getElementById('roster').innerHTML='';
    document.getElementById('boardArea').innerHTML='';
    renderTicker(lg); renderFoot(lg); return;
  }

  const {pool,need}=computeRecs(lg);
  renderRec(pool[0],need,lg);
  renderTicker(lg);
  renderRoster(lg);
  renderBoard(pool.slice(0,12));
  renderFoot(lg);
}

function renderRec(p,need,lg){
  if(!p){document.getElementById('recArea').innerHTML='';return;}
  const survives=p.avgRank!=null && p.avgRank<24 ? 'likely gone by your next pick'
                 : 'expected to survive to your next pick';
  const survClass = p.avgRank!=null && p.avgRank<24 ? 'warn':'';
  document.getElementById('recArea').innerHTML=`
    <div class="card rec">
      <div class="top">
        <div class="name">${p.name.toUpperCase()}
          <span class="tierpill">${p.tier||'—'}</span></div>
        <div class="posbadge">${p.pos}</div>
      </div>
      <div class="meta">${p.team||''} · YOUR POS RANK #${p.seanPosRank} · CONSENSUS ADP #${p.avgRank??'—'}${
        typeof p.myDiff==='number'?` · YOUR DIFF ${p.myDiff>0?'+':''}${p.myDiff}`:''}</div>
      <div class="row"><span>Positional need</span>
        <span class="why">${need.has(p.pos)?'fills open '+p.pos+' starter':'depth / BPA'}</span></div>
      <div class="row"><span>Survival to next pick</span>
        <span class="why ${survClass}">${survives}</span></div>
      <div class="row"><span>Keeper impact (this league)</span>
        <span class="why">${lg.keepers.length} players kept league-wide</span></div>
    </div>`;
}

function renderTicker(lg){
  // mock feed from keepers so it looks live; replace with poll results
  const items = lg.keepers.length
    ? lg.keepers.slice(0,8).map(k=>`<span><b>${k.team}</b> keeps ${k.player} (R${k.round})</span>`)
    : [`<span>NO PICKS YET · <b>${lg.myTeam}</b> ON DECK</span>`];
  const track=[...items,...items].join('');
  document.getElementById('ticker').innerHTML=track;
}

function renderRoster(lg){
  const keptForMe=lg.keepers.filter(k=>{
    const me=lg.teams.find(t=>t.isMe); return me && k.team===me.team;
  });
  document.getElementById('roster').innerHTML=lg.rosterSlots.map((slot,i)=>{
    const kept=keptForMe[i];
    const cls = kept?'filled keeper':(['BEN'].includes(slot)?'empty':'empty need');
    return `<div class="slot ${cls}">
      <div class="s-pos">${slot}</div>
      <div class="s-val">${kept?kept.player:'—'}</div></div>`;
  }).join('');
}

function renderBoard(list){
  document.getElementById('boardArea').innerHTML=`
    <table><thead><tr>
      <th>Player</th><th>Pos</th><th class="num">You</th>
      <th class="num">ADP</th><th class="num">Diff</th><th>Tier</th>
    </tr></thead><tbody>${
      list.map(p=>{
        const d=typeof p.myDiff==='number'?p.myDiff:null;
        const dc=d==null?'':(d>0?'diff-pos':'diff-neg');
        return `<tr>
          <td>${p.name}</td><td>${p.pos}</td>
          <td class="num">${p.seanPosRank}</td>
          <td class="num">${p.avgRank??'—'}</td>
          <td class="num ${dc}">${d==null?'—':(d>0?'+':'')+d}</td>
          <td style="color:var(--dim)">${(p.tier||'').split(' - ')[0]||'—'}</td>
        </tr>`;
      }).join('')
    }</tbody></table>`;
}

function renderFoot(lg){
  document.getElementById('foot').innerHTML=
    `SOURCE · ${DATA.players.length} players from FY${DATA.meta.season} Big Board · `+
    `${lg.teams.length} teams · ${lg.keepers.length} keepers · platform ${lg.platform.toUpperCase()}.<br>`+
    `MOCK MODE — live draft feed & roster fill activate when the ${lg.platform.toUpperCase()} poll is wired in.`;
}

// ---------- Zimmer History view ----------
function tagClass(tag){
  if(tag==='Stars & Scrubs') return 'stars';
  if(tag==='Value Hunter') return 'value';
  if(tag==='Balanced') return 'balanced';
  if(tag==='Market Driver') return 'stars';
  if(tag==='Quiet Accumulator') return 'value';
  if(tag.startsWith('Punts')) return 'value';
  return 'balanced'; // e.g. "RB-Priority"
}

function renderLatestTrends(){
  const lt = ZHIST.latest_season_trends;
  if(!lt || !(lt.notes||[]).length) return '';
  const noteHtml = lt.notes.map(n=>{
    // color up/down and dollar/point movements
    let s = n.replace(/(\$\d+(?:\.\d+)?)/g,'<b>$1</b>')
             .replace(/\b(more|up)\b/g,'<span style="color:var(--green)">$1</span>')
             .replace(/\b(less|down)\b/g,'<span style="color:var(--red)">$1</span>');
    return `<div class="headline" style="border-left-color:var(--amber)">${s}</div>`;
  }).join('');
  return `<div class="seclabel">${lt.season} vs Prior Years — What Moved</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:8px;line-height:1.5;">
      How last season's market differed from the ${lt.prior_seasons.length}-year baseline before it —
      where the money shifted, and how elite-tier prices moved.
    </div>
    ${noteHtml}`;
}

function renderHistory(){
  const el=document.getElementById('historyView');
  if(!ZHIST){
    el.innerHTML=`<div class="seclabel">Zimmer Auction History</div>
      <div class="empty-note">zimmer_analysis.json not found.<br>
      Run the "Update Zimmer Draft History" workflow, then the analysis step, to populate this view.</div>`;
    return;
  }

  // headlines
  const headlinesHtml = (ZHIST.headlines||[]).map(h=>{
    // bold any $-amounts and position-tier tokens for scannability
    const withBold=h.replace(/(\$\d+)/g,'<b>$1</b>');
    return `<div class="headline">${withBold}</div>`;
  }).join('');

  // tier spread table, grouped by position with an inline range bar
  const tiers=ZHIST.tier_spreads||[];
  const globalMax=Math.max(1,...tiers.map(t=>t.high));
  let tierRows=''; let curPos=null;
  tiers.forEach(t=>{
    if(t.position!==curPos){
      curPos=t.position;
      tierRows+=`<tr><td colspan="5" class="pos-head">${curPos}</td></tr>`;
    }
    const leftPct=100*t.low/globalMax;
    const widthPct=Math.max(2,100*(t.high-t.low)/globalMax);
    tierRows+=`<tr>
      <td>${t.tier}</td>
      <td class="bar-cell">
        <div class="barwrap">
          <div class="barfill" style="left:${leftPct}%;width:${widthPct}%;"></div>
          <div class="barlbl"><span>$${t.low}</span><span>$${t.high}</span></div>
        </div>
      </td>
      <td class="num">$${t.avg}</td>
      <td class="num">$${t.spread}</td>
      <td class="num">${t.n}</td>
    </tr>`;
  });

  // owner cards
  const owners=ZHIST.owners||[];
  const ownerCards=owners.map(o=>{
    const tagsHtml=(o.tags||[]).map(t=>`<span class="otag ${tagClass(t)}">${t.toUpperCase()}</span>`).join('');
    const posChips=Object.entries(o.pos_avg_spend||{})
      .sort((a,b)=>b[1]-a[1])
      .map(([pos,avg])=>`<span class="pchip">${pos} avg $${avg}</span>`).join('');
    return `<div class="ownercard">
      <div class="oname">${o.owner}${tagsHtml}</div>
      <div class="ostats">
        <div class="ostat">TOP-3 SPEND<b>${o.top3_spend_share_pct}%</b></div>
        <div class="ostat">STUDS / DRAFT<b>${o.avg_studs_per_draft}</b></div>
        <div class="ostat">BARGAINS / DRAFT<b>${o.avg_bargains_per_draft}</b></div>
        <div class="ostat">MAX BID EVER<b>$${o.max_bid_ever}</b></div>
        <div class="ostat">SEASONS<b>${o.seasons}</b></div>
      </div>
      <div class="posspend">Avg spend by position: ${posChips||'—'}</div>
      <div class="stratnote">${o.strategy_note||''}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="seclabel">Zimmer Auction — Key Trends</div>
    ${headlinesHtml}

    ${renderLatestTrends()}

    <div class="seclabel">Winning-Bid Spread by Position Tier</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:8px;line-height:1.5;">
      Tiers derived per season by ranking each position's players on price paid
      (WR1 = the priciest WRs that year). Pooled across ${ (ZHIST.seasons_analyzed||[]).length } drafts:
      ${(ZHIST.seasons_analyzed||[]).join(', ')}.
    </div>
    <table class="tiertbl"><thead><tr>
      <th>Tier</th><th>Low → High Range</th><th class="num">Avg</th>
      <th class="num">Spread</th><th class="num">N</th>
    </tr></thead><tbody>${tierRows}</tbody></table>

    <div class="seclabel">Per-Owner Auction Tendencies</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:8px;line-height:1.5;">
      Aggregated by owner (team names change year to year; name variants merged, one-season
      members excluded). Three signals combine into each owner's tags: spend concentration
      (stars-and-scrubs vs. balanced vs. value), positional lean vs. league average, and
      nomination behavior (do their nominations tend to sell high or cheap). Strategy note
      below each card is the tactical takeaway for a head-to-head bid.
    </div>
    ${ownerCards}

    ${renderDraftGrades()}

    <div class="foot">
      SOURCE · zimmer_analysis.json · ${owners.length} owners across
      ${(ZHIST.seasons_analyzed||[]).length} auction seasons.
    </div>`;
}

function renderDraftGrades(){
  if(!ZGRADES || !(ZGRADES.owners||[]).length){
    return `<div class="seclabel">Draft Effectiveness</div>
      <div class="empty-note">zimmer_draft_grades.json not found or empty.<br>
      Run the season/weekly stats workflows for each graded year, then "Update Zimmer Draft Grades."</div>`;
  }
  const years = ZGRADES.years_graded||[];
  const headlineHtml = (ZGRADES.headlines||[]).map(h=>{
    const s = h.replace(/([+-]?\d+\.\d+)/g,'<b>$1</b>');
    return `<div class="headline" style="border-left-color:var(--green)">${s}</div>`;
  }).join('');

  const rows = ZGRADES.owners.map((o,i)=>{
    const sp = o.war_surplus_per_dollar;
    const spClass = sp>0 ? 'diff-pos' : (sp<0 ? 'diff-neg' : '');
    return `<tr>
      <td>${i+1}. ${o.owner}</td>
      <td class="num ${spClass}">${sp>0?'+':''}${sp}</td>
      <td class="num">${o.hit_rate_pct}%</td>
      <td class="num">${o.avg_volatility??'—'}</td>
      <td style="color:var(--dim)">${o.concentration_style||'—'}</td>
    </tr>`;
  }).join('');

  const styleRows = (ZGRADES.style_correlation||[]).map(s=>{
    const cls = s.avg_war_surplus_per_dollar>0?'diff-pos':'diff-neg';
    return `<tr><td>${s.style}</td><td class="num ${cls}">${s.avg_war_surplus_per_dollar>0?'+':''}${s.avg_war_surplus_per_dollar}</td><td class="num">${s.n_owners}</td></tr>`;
  }).join('');

  return `
    <div class="seclabel">Draft Effectiveness (${years.length?Math.min(...years):''}–${years.length?Math.max(...years):''})</div>
    <div style="font-size:10px;color:var(--dim);margin-bottom:8px;line-height:1.5;">
      Grades against WAR (points above replacement level), not raw points per dollar --
      raw points/$ makes shallow positions like K/DEF look like great value simply for
      being cheap, even though there's little gap between an elite and a replacement-level
      one. Surplus $ = WAR delivered beyond what the going market rate for that price
      implied. Hit rate = % of graded picks that beat market rate at all.
    </div>
    ${headlineHtml}
    <table><thead><tr>
      <th>Owner</th><th class="num">WAR Surplus/$</th><th class="num">Hit Rate</th>
      <th class="num">Volatility</th><th>Style</th>
    </tr></thead><tbody>${rows}</tbody></table>

    <div class="seclabel" style="margin-top:18px;">Effectiveness by Drafting Style</div>
    <table><thead><tr><th>Style</th><th class="num">Avg WAR Surplus/$</th><th class="num">Owners</th></tr></thead>
    <tbody>${styleRows}</tbody></table>

    <div class="foot">
      ${ZGRADES.unmatched_picks||0} historical picks had no stat match (deep bench/inactive players)
      and were excluded from grading.
    </div>`;
}

// ---------- Auction Draft mode (Zimmer) ----------
// Core UX: someone nominates a player -> search for them -> see everything
// needed to decide a bid, in one card. Manual search is the mechanism for now
// (see ASSUMED_BUDGET/ASSUMED_ROSTER note above for the other manual-tracking
// assumption this depends on).

function expectedBidRange(player){
  if(!ZHIST || !player.seanPosRank || player.pos==='NA') return null;
  const tier = tierLabelForRank(player.pos, player.seanPosRank - 1);
  const row = (ZHIST.tier_spreads||[]).find(t=>t.position===player.pos && t.tier===tier);
  return row ? {...row, tier} : null;
}

// Mission Control Target Bid -- STATIC base only (WAR x calibrated $/WAR rate).
// This is deliberately just the foundation: base = projected WAR x the
// blended (Zimmer history + ESPN) rate for this player's WAR band/position,
// from bid_calibration.json. Live adjustments (scarcity, roster fit, budget
// clamp, opponent pressure) are a separate future layer -- NOT included yet.
// K/DEF are excluded from calibration entirely (always min-bid), so this
// returns null for those positions by design, not by data gap.
function bandForWar(war){
  if(!BIDCAL) return null;
  for(const b of BIDCAL.war_bands){
    if(war>=b.min_war && war<b.max_war) return b.label;
  }
  return null;
}
function blendedRateFor(position, band){
  if(!BIDCAL || !band) return null;
  const rows = BIDCAL.dollar_per_war[position] || BIDCAL.dollar_per_war['GLOBAL'];
  if(!rows) return null;
  let row = rows.find(r=>r.band===band);
  if((!row || row.blended_rate==null) && position!=='GLOBAL'){
    const globalRows = BIDCAL.dollar_per_war['GLOBAL'];
    row = globalRows && globalRows.find(r=>r.band===band);
  }
  return row ? row.blended_rate : null;
}
function computeMissionControlBid(player){
  if(!BIDCAL) return null;
  if(!(BIDCAL.positions_included||[]).includes(player.pos)) return null; // K/DEF excluded by design
  const war = player.projectedWar;
  if(war==null) return null;
  const band = bandForWar(war);
  const rate = blendedRateFor(player.pos, band);
  if(rate==null) return null;
  const bid = war>0 ? Math.max(1, Math.round(war*rate)) : 1; // floor at $1, matches real auction minimums
  return {bid, band, rate};
}

// Adjusted WAR (v1 roster-fit discount): raw projected WAR discounted by how
// much of MY starting need at that position is already filled. Your 1st RB is
// worth full WAR; each additional one toward/past your starting slots is worth
// progressively less to YOU, even if raw WAR is identical. This is the first
// piece of the "live adjustments" layer -- roster-aware, recalculated from your
// own drafted picks. (Scarcity/opponent adjustments remain future work.)
// Only meaningful for the league you're actively drafting; for the standalone
// Players tab across leagues it uses the active league's roster context.
function rosterFillFactor(pos){
  const myPicks = zimmerDraft.picks.filter(p=>p.isMine);
  const myCount = myPicks.filter(p=>p.position===pos).length;
  // starting capacity for this position incl. flex share for RB/WR/TE
  const starters = ASSUMED_ROSTER.filter(s=>s===pos).length;
  const flex = (pos==='RB'||pos==='WR'||pos==='TE') ? ASSUMED_ROSTER.filter(s=>s==='FLEX').length : 0;
  const capacity = Math.max(1, starters + flex);
  // full value until starters filled, then decay toward a depth floor (0.35)
  if(myCount < capacity) return 1 - 0.15*myCount/capacity;  // mild taper within capacity
  const over = myCount - capacity + 1;
  return Math.max(0.35, 0.85 * Math.pow(0.6, over));         // steeper decay past capacity
}
function computeAdjustedWar(player){
  const war = player.projectedWar;
  if(war==null) return null;
  // roster fit only applies to positions we track a roster for; K/DEF etc pass through
  const factor = ['QB','RB','WR','TE'].includes(player.pos) ? rosterFillFactor(player.pos) : 1;
  return Math.round(war * factor * 10) / 10;
}

function ptDraftedMap(){
  // which Big Board players are drafted, from the current league's logged picks.
  // Zimmer uses zimmerDraft.picks; snake leagues have no live log yet, so map
  // is empty there (all show available) -- the table still works as reference.
  const map = {};
  if(activeLeague==='zimmer'){
    zimmerDraft.picks.forEach(pick=>{
      const bp = findBigBoardPlayer(pick.name);
      if(bp) map[bp.id] = {cost:pick.cost, isMine:!!pick.isMine};
    });
  }
  return map;
}

function ptRows(){
  const drafted = ptDraftedMap();
  let rows = DATA.players.filter(p=>p.pos && p.pos!=='NA').map(p=>{
    const mc = computeMissionControlBid(p);
    const d = drafted[p.id];
    return {
      ...p,
      missionBid: mc ? mc.bid : null,
      adjWar: computeAdjustedWar(p),
      _drafted: !!d, _mine: d ? d.isMine : false, _cost: d ? d.cost : null,
      status: d ? (d.isMine?'mine':'taken') : 'avail',
    };
  });

  // filters
  const q = playerTable.query.trim().toLowerCase();
  if(q) rows = rows.filter(r=>r.name.toLowerCase().includes(q));
  if(playerTable.posFilter!=='ALL') rows = rows.filter(r=>r.pos===playerTable.posFilter);
  if(playerTable.availFilter==='AVAIL') rows = rows.filter(r=>!r._drafted);
  if(playerTable.availFilter==='TAKEN') rows = rows.filter(r=>r._drafted);

  // sort
  const k = playerTable.sortKey, dir = playerTable.sortDir==='asc'?1:-1;
  rows.sort((a,b)=>{
    let av=a[k], bv=b[k];
    // nulls always sort last regardless of direction
    const an=(av==null||av===''), bn=(bv==null||bv==='');
    if(an&&bn) return 0;
    if(an) return 1;
    if(bn) return -1;
    if(typeof av==='number' && typeof bv==='number') return (av-bv)*dir;
    return String(av).localeCompare(String(bv))*dir;
  });
  return rows;
}

function computeTeamFit(player){
  const myPicks = zimmerDraft.picks.filter(p=>p.isMine);
  const spent = myPicks.reduce((s,p)=>s+p.cost,0);
  const remaining = ASSUMED_BUDGET - spent;
  const slotsLeft = ASSUMED_ROSTER.length - myPicks.length;
  const maxBid = Math.max(1, remaining - Math.max(0, slotsLeft - 1)); // $1 reserve per remaining slot after this one

  const posCount = {};
  myPicks.forEach(p=>{ posCount[p.position] = (posCount[p.position]||0) + 1; });
  const myCount = posCount[player.pos] || 0;
  const starterSlotsForPos = ASSUMED_ROSTER.filter(s=>s===player.pos).length;
  const flexEligible = (player.pos==='RB'||player.pos==='WR') ? ASSUMED_ROSTER.filter(s=>s==='FLEX').length : 0;
  const fillsStarterNeed = myCount < (starterSlotsForPos + flexEligible);

  let note = `You have $${remaining} left with ${slotsLeft} slot${slotsLeft===1?'':'s'} to fill `+
    `(max bid ~$${maxBid} after reserving $1/slot). `;
  note += fillsStarterNeed
    ? `This would be your ${myCount+1}${myCount===0?'st':myCount===1?'nd':myCount===2?'rd':'th'} ${player.pos} — fills a starting need.`
    : `You already have ${myCount} ${player.pos}s covering your starting slots — this would be pure depth.`;
  return {remaining, slotsLeft, maxBid, note};
}

function myBudgetForPlayer(){
  // My current max feasible bid = budget left minus $1 reserve per other
  // remaining slot. Same math as the banner MAX BID (independent of the
  // specific player -- it's "the most I could spend on any single player now").
  const myPicks = zimmerDraft.picks.filter(p=>p.isMine);
  const spent = myPicks.reduce((s,p)=>s+p.cost,0);
  const remaining = ASSUMED_BUDGET - spent;
  const slotsLeft = ASSUMED_ROSTER.length - myPicks.length;
  return Math.max(1, remaining - Math.max(0, slotsLeft - 1));
}

function renderOpponentPanel(player, root){
  const area = (root||document).querySelector('.opponentPanelArea');
  if(!area) return;
  if(!ZHIST || !ZHIST.owners || !ZHIST.owners.length){
    area.innerHTML = `<div class="seclabel">Opponents</div>
      <div class="empty-note">Opponent tendencies need zimmer_analysis.json.<br>Run the analysis workflow.</div>`;
    return;
  }

  // per-opponent live spend (from attributed picks) -> remaining budget
  const oppSpend = {};
  const oppCount = {};
  zimmerDraft.picks.forEach(pick=>{
    if(pick.owner){
      oppSpend[pick.owner] = (oppSpend[pick.owner]||0) + pick.cost;
      oppCount[pick.owner] = (oppCount[pick.owner]||0) + 1;
    }
  });

  // Score each opponent's likely aggression on the SELECTED player.
  const scored = ZHIST.owners.map(o=>{
    const spent = oppSpend[o.owner]||0;
    const picksMade = oppCount[o.owner]||0;
    const budgetLeft = ASSUMED_BUDGET - spent;
    const slotsLeft = ASSUMED_ROSTER.length - picksMade;
    const attributed = picksMade>0; // do we actually have live data on them?

    let aggression = 0;
    const reasons = [];

    if(player){
      // (a) budget headroom: more $ left than an average remaining slot implies
      const perSlot = slotsLeft>0 ? budgetLeft/slotsLeft : 0;
      if(attributed){
        if(perSlot > 12){ aggression += 2; reasons.push(`flush ($${budgetLeft} left)`); }
        else if(perSlot < 5){ aggression -= 2; reasons.push(`budget-tight ($${budgetLeft} left)`); }
      }
      // (b) positional lean: do they historically pay up for / prioritize this position?
      if(o.priority_position===player.pos){ aggression += 2; reasons.push(`${player.pos}-priority historically`); }
      if(o.punt_position===player.pos){ aggression -= 2; reasons.push(`punts ${player.pos} historically`); }
      // (c) concentration style vs player caliber (tier)
      const eliteTier = player.seanPosRank!=null && player.seanPosRank<=6;
      if(o.concentration_style==='stars' && eliteTier){ aggression += 1; reasons.push('stars-&-scrubs on elite'); }
      if(o.concentration_style==='value' && eliteTier){ aggression -= 1; reasons.push('value-hunter, avoids top $'); }
      // (d) market driver signal
      if((o.tags||[]).includes('Market Driver')){ aggression += 1; reasons.push('market driver'); }
    }
    return {o, budgetLeft, slotsLeft, attributed, aggression, reasons};
  });

  // sort: hottest first
  scored.sort((a,b)=>b.aggression-a.aggression);

  const legend = player
    ? `<div class="aggr-legend">Likely bidders on <b style="color:var(--amber)">${player.name}</b>:
       <span style="color:var(--red)">red = aggressive</span>, <span style="color:var(--dim)">dim = unlikely</span>.
       Based on budget, historical position lean, and draft style.</div>`
    : `<div class="aggr-legend">Select a player to see who's likely to bid aggressively.</div>`;

  const cards = scored.map(s=>{
    const hot = player && s.aggression>=3;
    const cold = player && s.aggression<=-2;
    const tags = (s.o.tags||[]).slice(0,2).map(t=>`<span class="otag ${tagClass(t)}">${t}</span>`).join(' ');
    const budgetTxt = s.attributed
      ? `$${s.budgetLeft} · ${s.slotsLeft} slots`
      : `<span style="color:var(--line-2)">budget untracked</span>`;
    let aggrLine = '';
    if(player){
      const cls = hot?'hot':(cold?'cold':'neutral');
      const verdict = hot?'▲ LIKELY AGGRESSIVE':(cold?'▽ unlikely':'– neutral');
      aggrLine = `<div class="opp-aggr ${cls}">${verdict}${s.reasons.length?' — '+s.reasons.join(', '):''}</div>`;
    }
    return `<div class="opp-card ${hot?'hot':''} ${cold?'cold':''}">
      <div class="opp-head"><span class="opp-name">${s.o.owner}</span><span class="opp-budget">${budgetTxt}</span></div>
      <div class="opp-tags">${tags}</div>
      ${aggrLine}
    </div>`;
  }).join('');

  area.innerHTML = `<div class="seclabel">Opponent Intel</div>${legend}<div class="opp-grid">${cards}</div>`;
}

function renderPositionBoard(player, root){
  const area = (root||document).querySelector('.positionBoardArea');
  if(!area) return;
  if(!player){ area.innerHTML=''; return; }
  const pos = player.pos;

  // Build a lookup: Big Board player id -> {cost, isMine} from ALL logged picks
  // (matched by name -- see findBigBoardPlayer). This is what marks players
  // "drafted" on the board below, regardless of which team took them.
  const draftedMap = {};
  zimmerDraft.picks.forEach(pick=>{
    const bp = findBigBoardPlayer(pick.name);
    if(bp) draftedMap[bp.id] = {cost: pick.cost, isMine: !!pick.isMine};
  });

  const posPlayers = DATA.players
    .filter(p=>p.pos===pos && p.seanPosRank!=null)
    .sort((a,b)=>a.seanPosRank-b.seanPosRank);

  // group into tiers, same bucketing as Expected Bid Range
  const tierGroups = {}; // tierLabel -> [players]
  const tierOrder = [];
  posPlayers.forEach(p=>{
    const t = tierLabelForRank(pos, p.seanPosRank-1);
    if(!tierGroups[t]){ tierGroups[t]=[]; tierOrder.push(t); }
    tierGroups[t].push(p);
  });

  const isDeepTier = (label)=> label.includes('+');

  let html = `<div class="seclabel">Position Board — ${pos}</div>
    <div class="aggr-legend">
      <span class="m-espn" style="color:var(--cyan);">E</span> = ESPN Recommended Bid ·
      <span style="color:var(--amber);">T</span> = Mission Control Target Bid (WAR × calibrated $/WAR, base only) ·
      <span class="m-war" style="color:var(--amber);">WAR</span> = projected points above replacement
    </div>`;

  tierOrder.forEach(tierLabel=>{
    const group = tierGroups[tierLabel];
    const histRow = (ZHIST && ZHIST.tier_spreads||[]).find(t=>t.position===pos && t.tier===tierLabel);

    // this year's actual costs so far for drafted players in this tier
    const currentCosts = group
      .filter(p=>draftedMap[p.id])
      .map(p=>draftedMap[p.id].cost);
    let trendBadge = '';
    if(histRow && currentCosts.length){
      const curAvg = currentCosts.reduce((a,b)=>a+b,0)/currentCosts.length;
      const deltaPct = Math.round(100*(curAvg-histRow.avg)/histRow.avg);
      const cls = deltaPct>=8?'up':(deltaPct<=-8?'down':'flat');
      const sign = deltaPct>0?'+':'';
      trendBadge = `<span class="trend-badge ${cls}">${sign}${deltaPct}% vs hist this yr</span>`;
    }

    const histText = histRow
      ? `historic <b>$${histRow.low}–$${histRow.high}</b> avg $${histRow.avg}`
      : `no historic data`;

    html += `<div class="tier-group">
      <div class="tier-group-head">
        <span class="tg-name">${tierLabel}</span>
        <span class="tg-hist">${histText} ${trendBadge}</span>
      </div>`;

    if(isDeepTier(tierLabel)){
      // deep catch-all tier: summarize instead of listing every player
      const draftedCount = group.filter(p=>draftedMap[p.id]).length;
      html += `<div class="pbr"><span class="pbr-name" style="color:var(--dim)">
        ${group.length} players in this depth tier</span>
        <span class="pbr-status" style="color:var(--dim)">${draftedCount} drafted, ${group.length-draftedCount} available</span></div>`;
    } else {
      group.forEach(p=>{
        const d = draftedMap[p.id];
        const isSelected = p.id===player.id;
        const team = p.proTeamEspn || p.team || '';
        const bye = p.byeWeek ? `BYE ${p.byeWeek}` : '';
        const espnBid = p.espnRecommendedBid!=null ? `$${Math.round(p.espnRecommendedBid)}` : '—';
        const mc = computeMissionControlBid(p);
        const war = p.projectedWar!=null ? `${p.projectedWar>0?'+':''}${p.projectedWar}` : '—';

        let statusHtml;
        if(d){
          // Still show E/T even once drafted, so you can spot-check T against
          // what the player actually sold for as the draft progresses. Flag
          // when the winning bid deviates meaningfully from Target (>25%).
          let deltaTag = '';
          if(mc){
            const diffPct = Math.round(100*(d.cost-mc.bid)/mc.bid);
            if(Math.abs(diffPct)>=25){
              const cls = diffPct>0 ? 'up' : 'down';
              deltaTag = ` <span class="trend-badge ${cls}" style="margin-left:4px;">${diffPct>0?'+':''}${diffPct}% vs T</span>`;
            }
          }
          statusHtml = `<span style="display:flex;flex-direction:column;align-items:flex-end;">
            <span class="pbr-status ${d.isMine?'mine':''}">$${d.cost}${d.isMine?' ★':''}${deltaTag}</span>
            <span class="pbr-metric" style="margin-top:2px;">
              <span class="m-espn">E:${espnBid}</span> · <span style="color:var(--amber)">T:${mc?'$'+mc.bid:'—'}</span>
            </span>
          </span>`;
        } else {
          statusHtml = `<span class="pbr-metric">
            <span class="m-espn">E:${espnBid}</span> · <span style="color:var(--amber)">T:${mc?'$'+mc.bid:'—'}</span><br>
            WAR:<span class="m-war">${war}</span></span>`;
        }
        html += `<div class="pbr ${d?'drafted':''} ${isSelected?'selected':''}">
          <span class="pbr-col-main">
            <span class="pbr-name"><span class="pbr-rank">#${p.seanPosRank}</span>${p.name}</span>
            <span class="pbr-meta">${team}${bye?' · '+bye:''}</span>
          </span>
          ${statusHtml}
        </div>`;
      });
    }
    html += `</div>`;
  });

  area.innerHTML = html;
}

function renderLoggedPicks(){
  const el = document.getElementById('loggedPicks');
  if(!zimmerDraft.picks.length){
    el.innerHTML = `<div class="empty-note">No picks logged yet.</div>`;
    return;
  }
  el.innerHTML = zimmerDraft.picks.map((p,i)=>`
    <div class="logged-pick-row">
      <span>${p.isMine?'★ ':''}${p.name} <span style="color:var(--dim)">(${p.position})</span></span>
      <span>$${p.cost} <button data-i="${i}">✕</button></span>
    </div>`).join('');
  el.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{
      zimmerDraft.picks.splice(parseInt(b.dataset.i,10),1);
      renderAuctionDraft();
    };
  });
}

// ---------- Replay mode ----------
// Plays back a REAL historical Zimmer draft, pick by pick, through the same
// kind of UI the live draft-day interface will use. Purpose: test the ticker,
// roster/budget tracking, and best-available board against real data and
// real cadence, without needing an actual live draft window open. The "Top
// Recommendation" here is necessarily RETROSPECTIVE (highest eventual price
// among remaining players) since these are already-completed drafts -- it's
// there to exercise the recommendation-card UI, not to simulate real strategy.

function stopReplayTimer(){
  if(replay.timer){ clearInterval(replay.timer); replay.timer=null; }
  replay.playing=false;
}

function renderReplay(){
  const el=document.getElementById('replayView');
  if(!ZDRAFTS){
    el.innerHTML=`<div class="seclabel">Replay — Zimmer Draft History</div>
      <div class="empty-note">zimmer_draft_history.json not found.<br>
      Run the "Update Zimmer Draft History" workflow to populate this view.</div>`;
    return;
  }
  if(!replay.started){ renderReplaySetup(el); }
  else { renderReplayPlayback(el); }
}

function renderReplaySetup(el){
  const seasons = Object.keys(ZDRAFTS.seasons||{}).sort().reverse();
  const seasonSel = replay.season || seasons[0];
  const sdata = ZDRAFTS.seasons[seasonSel];
  const teamOptions = sdata ? Object.values(sdata.teams).map(t=>t.owners?.[0]||t.team_name) : [];
  const uniqueOwners = [...new Set(teamOptions)];

  el.innerHTML=`
    <div class="seclabel">Replay — Zimmer Draft History</div>
    <div style="font-size:10px;color:var(--dim);line-height:1.5;">
      Plays back a real completed draft pick-by-pick so we can test the live-draft
      interface (ticker, roster/budget tracking, board) without waiting for an actual
      live draft window. Recommendations shown during replay are retrospective
      (known outcomes), not real strategic advice.
    </div>
    <div class="replay-setup">
      <label>Season</label>
      <select id="replaySeasonSel">
        ${seasons.map(s=>`<option value="${s}" ${s===seasonSel?'selected':''}>${s}</option>`).join('')}
      </select>
      <label>Play as (owner)</label>
      <select id="replayOwnerSel">
        ${uniqueOwners.map(o=>`<option value="${o}">${o}</option>`).join('')}
      </select>
      <button class="replay-start-btn" id="replayStartBtn">▶ Start Replay</button>
      <div class="replay-disclaimer">
        This uses a completed draft, so every outcome is already known. It's a test
        harness for the interface, not a prediction tool — the real recommendation
        engine (Big Board ranks, positional need, scarcity) only makes sense against
        the live 2026 player pool in Draft mode.
      </div>
    </div>`;

  document.getElementById('replaySeasonSel').onchange=(e)=>{
    replay.season=e.target.value; renderReplaySetup(el);
  };
  document.getElementById('replayStartBtn').onclick=()=>{
    const season=document.getElementById('replaySeasonSel').value;
    const owner=document.getElementById('replayOwnerSel').value;
    startReplay(season, owner);
  };
}

function startReplay(season, owner){
  const sdata = ZDRAFTS.seasons[season];
  const picks = [...(sdata.picks||[])];
  // chronological order: auctions use nomination_order, snake drafts use overall pick order
  if(picks.length && picks[0].nomination_order != null){
    picks.sort((a,b)=>(a.nomination_order||0)-(b.nomination_order||0));
  } else {
    picks.sort((a,b)=>((a.round||0)*1000+(a.pick||0))-((b.round||0)*1000+(b.pick||0)));
  }
  replay = {
    season, myOwner: owner, timeline: picks, teams: sdata.teams, idx: 0,
    playing: false, timer: null, speedMs: replay.speedMs||1500, started: true,
    // preserve the real live-draft picks so replay's synthesized picks (which
    // reuse zimmerDraft.picks to drive the shared cockpit components) don't
    // clobber an in-progress real draft. Restored in resetReplay / on exit.
    savedLivePicks: zimmerDraft.picks,
  };
  renderReplay();
}

function restoreLivePicks(){
  if(replay.savedLivePicks){
    zimmerDraft.picks = replay.savedLivePicks;
    replay.savedLivePicks = null;
  }
}

function resetReplay(){
  stopReplayTimer();
  restoreLivePicks();
  replay.started=false;
  renderReplay();
}

function stepReplay(delta){
  stopReplayTimer();
  replay.idx = Math.max(0, Math.min(replay.timeline.length, replay.idx+delta));
  renderReplay();
}

function toggleReplayPlay(){
  if(replay.playing){ stopReplayTimer(); renderReplay(); return; }
  if(replay.idx>=replay.timeline.length) return;
  replay.playing=true;
  replay.timer=setInterval(()=>{
    replay.idx++;
    if(replay.idx>=replay.timeline.length){ stopReplayTimer(); }
    renderReplay();
  }, replay.speedMs);
  renderReplay();
}

function renderReplayPlayback(el){
  const {timeline, idx, myOwner, teams} = replay;
  const picksSoFar = timeline.slice(0, idx);
  const isAuction = timeline.length && timeline[0].cost != null;
  const done = idx >= timeline.length;

  // Feed the SAME cockpit components the live Draft view uses, by projecting
  // replay picks-so-far into the zimmerDraft shape {name, position, cost,
  // isMine, owner}. This means Replay exercises the real position board and
  // opponent panel exactly as they'll behave live -- the whole point of the
  // rehearsal. The "next nominated player" is the pick that's about to happen
  // (timeline[idx]), so the card/board/opponent panel all react to it.
  zimmerDraft.picks = picksSoFar.map(p=>{
    const t = teams[String(p.team_id)];
    const owner = (t && t.owners && t.owners[0]) || p.team_name || null;
    return {
      name: p.player, position: p.position || '—', cost: p.cost || 0,
      isMine: owner===myOwner, owner: owner===myOwner ? null : owner,
    };
  });

  const nextPick = done ? null : timeline[idx];
  const nextPlayer = nextPick ? (findBigBoardPlayer(nextPick.player) || {
    // fall back to a minimal player object if not on the Big Board, so the
    // card still renders something meaningful during replay
    id:null, name: nextPick.player, pos: nextPick.position||'—',
    team:(teams[String(nextPick.team_id)]||{}).team_name||'', seanPosRank:null,
    tier:null, espnRecommendedBid:null, projectedWar:null, byeWeek:null, proTeamEspn:null,
  }) : null;

  const recent = picksSoFar.slice(-8).reverse();
  const tickerHtml = recent.length
    ? recent.map(p=>{
        const t=teams[String(p.team_id)];
        const owner=t?.owners?.[0]||p.team_name||'?';
        const priceTag = isAuction ? ` — $${p.cost}` : ` — R${p.round}.${p.pick}`;
        return `<span><b>${owner}</b> selects ${p.player}${priceTag}</span>`;
      }).join('')
    : `<span>DRAFT NOT YET STARTED</span>`;

  // controls + progress header
  el.innerHTML=`
    <div class="seclabel">Replay — ${replay.season} · as ${myOwner}
      <span class="retro-tag">rehearsal</span></div>
    <div class="replay-progress">PICK <b>${idx}</b> OF <b>${timeline.length}</b>${done?' · DRAFT COMPLETE':(nextPick?` · NEXT: ${nextPick.player}`:'')}</div>
    <div class="replay-controls">
      <button id="rwBtn" title="Step back">⏮</button>
      <button class="play-btn" id="playBtn">${replay.playing?'⏸ PAUSE':(done?'↺ RESTART':'▶ PLAY')}</button>
      <button id="fwBtn" title="Step forward">⏭</button>
      <select id="speedSel">
        <option value="2500" ${replay.speedMs===2500?'selected':''}>SLOW</option>
        <option value="1200" ${replay.speedMs===1200?'selected':''}>NORMAL</option>
        <option value="400" ${replay.speedMs===400?'selected':''}>FAST</option>
      </select>
      <button id="resetBtn" title="Choose different season/owner">⟲ SETUP</button>
    </div>

    <div class="ticker"><div class="track">${tickerHtml}${tickerHtml}</div></div>

    <div class="cockpit-cols" style="margin-top:14px;">
      <div class="cockpit-col">
        <div class="seclabel">On The Block ${nextPick&&isAuction?`<span class="retro-tag">sold $${nextPick.cost}</span>`:''}</div>
        <div class="playerCardArea"></div>
      </div>
      <div class="cockpit-col"><div class="positionBoardArea"></div></div>
      <div class="cockpit-col"><div class="opponentPanelArea"></div></div>
    </div>

    <div class="foot">
      REPLAY REHEARSAL — ${replay.season} Zimmer draft, real historical data, driving the same
      cockpit components as the live Draft view. Player card values (ESPN bid, WAR) reflect the
      CURRENT Big Board where the historical player matches by name; "On The Block" shows what the
      pick actually sold for.
    </div>`;

  // reuse the exact cockpit renderers, scoped to the replay view's own
  // elements (the Draft view has identically-named element IDs, so we must
  // pass the replay root or getElementById would target the hidden Draft copy)
  renderPlayerCard(nextPlayer, el);
  renderPositionBoard(nextPlayer, el);
  renderOpponentPanel(nextPlayer, el);

  document.getElementById('rwBtn').onclick=()=>stepReplay(-1);
  document.getElementById('fwBtn').onclick=()=>stepReplay(1);
  document.getElementById('playBtn').onclick=()=>{
    if(done && !replay.playing){ replay.idx=0; renderReplay(); return; }
    toggleReplayPlay();
  };
  document.getElementById('resetBtn').onclick=()=>resetReplay();
  document.getElementById('speedSel').onchange=(e)=>{
    replay.speedMs=parseInt(e.target.value,10);
    if(replay.playing){ stopReplayTimer(); toggleReplayPlay(); }
  };
}

boot();
</script>
