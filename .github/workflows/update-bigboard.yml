name: Update Big Board Data

# Run manually from the Actions tab — click "Run workflow"
on:
  workflow_dispatch:
    inputs:
      xlsx_path:
        description: 'Path to the Big Board Excel file in this repo'
        required: false
        default: 'data/FY26_BigBoard.xlsx'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run converter
        run: python convert_bigboard.py "${{ github.event.inputs.xlsx_path }}" bigboard.json

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bigboard.json
          git diff --staged --quiet || git commit -m "Update bigboard.json from ${{ github.event.inputs.xlsx_path }}"
          git push
