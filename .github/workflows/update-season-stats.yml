name: Update Season Stats (Replacement Level Data)

# Run manually from the Actions tab. Reuses the same ESPN secrets as the
# Zimmer history workflow: ESPN_LEAGUE_ID, ESPN_S2, ESPN_SWID.
on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Season year to pull full player-pool scoring for'
        required: false
        default: '2025'

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    env:
      ESPN_LEAGUE_ID: ${{ secrets.ESPN_LEAGUE_ID }}
      ESPN_S2: ${{ secrets.ESPN_S2 }}
      ESPN_SWID: ${{ secrets.ESPN_SWID }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install espn_api

      - name: Pull full-league season scoring
        run: python espn_season_stats.py "${{ github.event.inputs.year }}"

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add espn_season_stats_*.json
          git diff --staged --quiet || git commit -m "Update season stats for ${{ github.event.inputs.year }}"
          git push
