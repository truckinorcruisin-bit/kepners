name: Run Roster Optimizer

# Run manually from the Actions tab. Requires bigboard.json to already have
# projectedWar + espnRecommendedBid populated (i.e. run AFTER Update Big Board
# and Update Player Values). Writes results to roster_optimizer_result.md so
# you can just open that file on GitHub -- no terminal needed.
on:
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pulp

      - name: Run optimizer and capture output
        run: |
          echo "# Roster Optimizer Results" > roster_optimizer_result.md
          echo "" >> roster_optimizer_result.md
          echo "Generated $(date -u +"%Y-%m-%d %H:%M UTC") from bigboard.json." >> roster_optimizer_result.md
          echo "" >> roster_optimizer_result.md
          echo '```' >> roster_optimizer_result.md
          python3 roster_optimizer.py >> roster_optimizer_result.md
          echo '```' >> roster_optimizer_result.md

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add roster_optimizer_result.md roster_optimizer_result.json
          git diff --staged --quiet || git commit -m "Update roster optimizer results"
          git push
