name: Run Roster Optimizer

# Run manually from the Actions tab. Requires bigboard.json to already have
# projectedWar + espnRecommendedBid populated (i.e. run AFTER Update Big Board
# and Update Player Values). Writes results to roster_optimizer_result.md so
# you can just open that file on GitHub -- no terminal needed.
on:
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pulp

      - name: Run optimizer and capture output
        run: |
          {
            echo "# Roster Optimizer Results"
            echo ""
            echo "Generated $(date -u +"%Y-%m-%d %H:%M UTC") from bigboard.json."
            echo ""
            echo '```'
          } > roster_optimizer_result.md
          # Tee the optimizer's own stdout to BOTH the results file and the
          # Actions log (so a failure message is actually visible in the log,
          # not swallowed into the .md file). PIPESTATUS[0] preserves python's
          # real exit code through the pipe so the step still fails loudly if
          # the optimizer can't run (e.g. bigboard.json has no WAR/bid data yet
          # -- run "Update Player Values" first).
          python3 roster_optimizer.py 2>&1 | tee -a roster_optimizer_result.md
          status=${PIPESTATUS[0]}
          echo '```' >> roster_optimizer_result.md
          if [ "$status" -ne 0 ]; then
            echo "::error::roster_optimizer.py exited $status -- see the diagnosis printed above (it now explains exactly why: a starved position like K/DEF with no priced players, or budget too tight for the cheapest legal roster)."
            exit "$status"
          fi

      - name: Commit results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add roster_optimizer_result.md
          # the JSON is only produced on a successful run; add it only if present
          [ -f roster_optimizer_result.json ] && git add roster_optimizer_result.json
          git diff --staged --quiet || git commit -m "Update roster optimizer results"
          git push
