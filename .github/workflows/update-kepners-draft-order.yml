name: Update Kepners Draft Order

# Run manually any time the Google Sheet changes (owners claiming draft slots
# or locking in keepers). Reads directly from the public Google Sheet -- no
# secrets needed, no re-upload required. Run "Update Big Board" first if this
# is the very first run (needs bigboard.json's manager list to match names).
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync draft order from Google Sheet
        run: python kepners_draft_sync.py

      - name: Re-run Big Board conversion to merge it in
        run: |
          pip install openpyxl
          python convert_bigboard.py data/FY26_BigBoard.xlsx bigboard.json

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kepners_draft_order.json bigboard.json
          git diff --staged --quiet || git commit -m "Sync Kepners draft order/keepers"
          git push
