name: Update Bid Calibration

# Run manually from the Actions tab, AFTER these are up to date in the repo:
#   zimmer_draft_history.json
#   espn_season_stats_<year>.json for the graded years
#   espn_player_values_<year>.json
# No API secrets needed -- reads only committed JSON files.
on:
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build bid calibration
        run: python bid_calibration.py

      - name: Commit calibration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bid_calibration.json
          git diff --staged --quiet || git commit -m "Update bid calibration"
          git push
