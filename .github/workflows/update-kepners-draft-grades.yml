name: Update Kepners Draft Grades

# Grades Kepners keeper value using ESPN's espn_season_stats_<year>.json as a
# scoring proxy (confirmed materially equivalent to Kepners' Yahoo scoring --
# see kepners_draft_grades.py docstring). Requires that file to already exist
# in the repo (Zimmer's "Update Season Stats" workflow produces it) and
# kepners_draft_history.json to exist (from "Update Kepners Draft History").
on:
  workflow_dispatch:
    inputs:
      season:
        description: 'Season year to grade'
        required: false
        default: '2025'

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Grade keepers
        run: python kepners_draft_grades.py "${{ github.event.inputs.season }}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kepners_draft_grades.json
          git diff --staged --quiet || git commit -m "Update Kepners draft/keeper grades"
          git push
