name: Update Kepners Draft History

# Run manually from the Actions tab.
# Requires three repo secrets (Settings > Secrets and variables > Actions):
#   YAHOO_CLIENT_ID, YAHOO_CLIENT_SECRET, YAHOO_REFRESH_TOKEN
# See yahoo_setup.py docstring for how to obtain the refresh token (one-time,
# done locally with a browser -- Yahoo's login step can't run in CI).
on:
  workflow_dispatch:

jobs:
  fetch-history:
    runs-on: ubuntu-latest
    env:
      YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
      YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
      YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Pull Kepners draft history from Yahoo
        run: python yahoo_kepners_history.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kepners_draft_history.json
          git diff --staged --quiet || git commit -m "Update Kepners draft history"
          git push
